info:
  name: 03login passenger02
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "{{passenger02_username}}",
        "password": "{{passenger02_password}}"
      }

runtime:
  variables:
    - name: passenger02_username
      value: passenger02
    - name: passenger02_password
      value: "12345678"
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const json = typeof body === "string" ? JSON.parse(body) : body;
        bru.setEnvVar("passenger_02_token", json.data.token);
        bru.setEnvVar("passenger_02_id", json.data.user.id);
    - type: tests
      code: |-
        const body = res.getBody();
        const json = typeof body === "string" ? JSON.parse(body) : body;

        test("Status code: 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("คืนค่า token กลับมา", () => {
          expect(json.data.token).to.be.a("string");
        });

        test("ส่ง role: passenger กลับมา", () => {
          expect(json.data.user.role).to.equal('PASSENGER');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
