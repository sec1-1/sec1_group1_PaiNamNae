info:
  name: Passenger Report
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/reports"
  body:
    type: json
    data: |-
      {
        "type": "PASSENGER",
        "category": "PAYMENT_ISSUE",
        "description": "ตังหมดครั้งที่ {{counter}}",
        "routeId": "{{routeId}}",
        "bookingId": "{{bookingId}}",
        "targetUserId": "{{driver_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        //counter for different report content
        let counter = bru.getEnvVar("counter") || 0;
        counter++;
        bru.setEnvVar("counter", counter);
    - type: after-response
      code: |-
        const body = res.getBody();
        const json = typeof body === "string" ? JSON.parse(body) : body;
        bru.setEnvVar("report_id", json.data.id);
        bru.setEnvVar("reporter_id", json.data.reporterId);
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("Status code ต้องเป็น 200 หรือ 201", () => {
          expect([200, 201]).to.include(res.getStatus());
          
        });

        test("new report must have id and not empty", function() {
            expect(report.data).to.have.property("id");
            expect(report.data.id).to.not.be.empty;
        });

        test("response must have text: Report created successfully", function() {
            expect(report.data).to.have.property("id");
            expect(report.data.id).to.not.be.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
