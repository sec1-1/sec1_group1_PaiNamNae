info:
  name: Passenger Report
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/reports"
  body:
    type: multipart-form
    data:
      - name: category
        type: text
        value: PAYMENT_ISSUE
      - name: description
        type: text
        value: ไม่มีตัง
      - name: routeId
        type: text
        value: "{{routeId}}"
      - name: bookingId
        type: text
        value: "{{bookingId}}"
      - name: targetUserId
        type: text
        value: "{{driver_id}}"
      - name: type
        type: text
        value: PASSENGER
      - name: ""
        type: text
        value: ""
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        //counter for different report content
        let counter = bru.getEnvVar("counter") || 0;
        counter++;
        bru.setEnvVar("counter", counter);
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("Status code ต้องเป็น 200 หรือ 201", () => {
          expect([200,201]).to.include(res.getStatus());
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
