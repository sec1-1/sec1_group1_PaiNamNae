info:
  name: Driver Approve Booking
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{base_url}}/api/bookings/{{bookingId}}/status"
  body:
    type: json
    data: |-
      {
        "status": "CONFIRMED"
      }
  auth:
    type: bearer
    token: "{{driver_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Approve booking: status 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
