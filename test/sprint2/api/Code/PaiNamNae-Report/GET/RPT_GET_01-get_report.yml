info:
  name: RPT_GET_01-get_report
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/reports/{{report_id}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("Get report by id success", function () {
          expect(res.getStatus()).to.equal(200);

          const body = res.getBody();
          expect(report.data).to.have.property("id");
          expect(report.data.id).to.equal(bru.getEnvVar("report_id"));

          expect(report.data).to.have.property("type");
          expect(report.data).to.have.property("category");
          expect(report.data).to.have.property("description");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
