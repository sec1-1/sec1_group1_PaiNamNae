info:
  name: RPT_GET_08-get_report_invalid_booking_id
  type: http
  seq: 8

http:
  method: GET
  url: "{{base_url}}/api/reports/booking/invalid_booking_id"
  auth:
    type: bearer
    token: "{{passenger_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("Status code ต้องเป็น 200 หรือ 201", () => {
          expect([200, 201]).to.include(res.getStatus());
        });

        test("report data should be null", function () {
          expect(report.data).to.equal(null);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
