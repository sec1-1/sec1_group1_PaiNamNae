info:
  name: TC-ADMIN-UPDATE-INCI-002-admin-get-report-with-field
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}reports/admin"
  auth:
    type: bearer
    token: "{{admin_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("ทุก report ต้องมี field ครบ (id,status,description)", function () {
          report.data.forEach(item => {
            expect(item).to.have.property("id");
            expect(item).to.have.property("status");
            expect(item).to.have.property("description");
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
