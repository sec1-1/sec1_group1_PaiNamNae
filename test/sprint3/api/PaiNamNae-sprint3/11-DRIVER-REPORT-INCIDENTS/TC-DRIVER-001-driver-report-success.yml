info:
  name: TC-DRIVER-001-driver-report-success
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}reports"
  body:
    type: multipart-form
    data:
      - name: type
        type: text
        value: DRIVER
      - name: category
        type: text
        value: OTHER
      - name: description
        type: text
        value: driver-report-no-{{counter}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        //counter for different report content
        let counter = bru.getEnvVar("counter") || 0;
        counter++;
        bru.setEnvVar("counter", counter);
    - type: after-response
      code: |-
        const body = res.getBody();
        const json = typeof body === "string" ? JSON.parse(body) : body;
        bru.setEnvVar("report_id", json.data.id);
    - type: tests
      code: |-
        const body = res.getBody();
        const report = typeof body === "string" ? JSON.parse(body) : body;

        test("Status code ต้องเป็น 201", () => {
          expect(res.getStatus()).to.equal(201);
        });

        test("report ต้องมี field ดังนี้ (id,status,description)", function () {
            expect(report.data).to.have.property("id");
            expect(report.data).to.have.property("status");
            expect(report.data).to.have.property("description");
          });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
